name: Daily Fish Stocking Check

on:
  schedule:
    # 15:00 UTC = 7:00 AM Pacific (PDT). During PST (winter) this is 8:00 AM
    # local, which is fine -- stocking season is March-October anyway.
    - cron: "0 15 * * *"
  workflow_dispatch: {}

# Allow the workflow to commit the updated state file back to the repo.
permissions:
  contents: write

concurrency:
  group: fish-stocking-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run stocking check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if [ -n "$(git status --porcelain data/)" ]; then
            git commit -m "chore: update stocking state [skip ci]"
            git push
          else
            echo "No changes in data/; nothing to commit."
          fi
